<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JARVIX Access</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at center, #0b0014, #000);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: white;
    }

    /* 💜 Cosmic particles */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(162,0,255,0.2) 2px, transparent 2px);
      background-size: 50px 50px;
      animation: moveStars 30s linear infinite;
    }

    @keyframes moveStars {
      from { transform: translate(0,0); }
      to { transform: translate(-200px,-200px); }
    }

    /* 💜 LOGIN CARD */
    .login-container {
      position: relative;
      width: 340px;
      padding: 35px;
      border-radius: 18px;
      background: rgba(20,0,40,0.85);
      border: 1px solid rgba(162,0,255,0.3);
      box-shadow: 0 0 40px rgba(162,0,255,0.3);
      backdrop-filter: blur(15px);
      text-align: center;
      z-index: 2;
    }

    /* 💜 Infinity glow border */
    .login-container::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 18px;
      background: linear-gradient(45deg, #7a00ff, #ff00cc, #7a00ff);
      z-index: -1;
      opacity: 0.4;
      filter: blur(12px);
    }

    /* 💜 TITLE */
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px;
      margin-bottom: 10px;
      color: #c084fc;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 25px;
    }

    /* 💜 INFINITY CORE */
    .infinity {
      width: 60px;
      height: 60px;
      margin: 0 auto 15px;
      border-radius: 50%;
      background: radial-gradient(circle, #a200ff, transparent 70%);
      box-shadow: 0 0 25px #a200ff;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    /* 💜 INPUTS */
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid rgba(162,0,255,0.3);
      background: rgba(0,0,0,0.6);
      color: white;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #c084fc;
      box-shadow: 0 0 10px rgba(162,0,255,0.6);
    }

    /* 💜 BUTTON */
    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(45deg, #7a00ff, #ff00cc);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(162,0,255,0.7);
    }

    /* 💜 ERROR */
    #error {
      margin-top: 10px;
      color: #ff4dff;
      font-size: 13px;
    }

  </style>
</head>

<body>

<div class="login-container">

  <div class="infinity"></div>

  <h1>INFINITY ACCESS</h1>
  <div class="subtitle">Power Beyond Limits</div>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">UNLOCK POWER</button>

  <p id="error"></p>

</div>

<script>
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (user === "admin" && pass === "1234") {
    localStorage.setItem("loggedIn", "true");
    window.location.href = "index.html";
  } else {
    document.getElementById("error").textContent = "ACCESS DENIED";
  }
}

// Auto redirect
if (localStorage.getItem("loggedIn")) {
  window.location.href = "index.html";
}
</script>

</body>
</html>
